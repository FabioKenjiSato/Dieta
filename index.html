<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dieta 65kg - Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-32">

    <div class="fixed bottom-0 left-0 w-full bg-gray-950 border-t border-green-500 p-4 z-50 shadow-2xl flex justify-between items-center px-6 md:px-12">
        <div>
            <p class="text-xs text-gray-400">Total do Dia:</p>
            <p class="text-xl font-bold text-orange-400"><span id="total-kcal">0</span> <span class="text-sm">kcal</span></p>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-400">Proteína Diária</p>
            <p class="text-xl font-bold text-green-400"><span id="total-prot">0</span><span class="text-sm">g</span></p>
        </div>
    </div>

    <div id="area-print" class="max-w-md mx-auto bg-gray-800 rounded-xl shadow-lg p-6 border-t-4 border-green-500 mt-4 md:mt-8 relative">
        <h1 class="text-2xl font-bold text-green-400 mb-1">Cardápio Nivelado</h1>
        <p class="text-sm text-gray-400 mb-6">Meta: 1500 - 1600 kcal | Sem Carne Vermelha</p>

        <div class="mb-8 border-l-4 border-yellow-500 pl-4">
            <h2 class="text-lg font-bold text-yellow-400 mb-3">1. Pequeno-Almoço</h2>
            <select id="cafe-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 border border-gray-600 focus:border-yellow-400"></select>
            <select id="cafe-carb" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 border border-gray-600 focus:border-yellow-400"></select>
            <select id="cafe-fruta" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 border border-gray-600 focus:border-yellow-400"></select>
        </div>

        <div id="step-almoco" class="mb-8 border-l-4 border-blue-500 pl-4 opacity-50 pointer-events-none transition-all duration-300">
            <h2 class="text-lg font-bold text-blue-400 mb-1">2. Almoço</h2>
            <select id="almoco-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 border border-gray-600"></select>
            <select id="almoco-carb" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 border border-gray-600"></select>
            <select id="almoco-folhas" onchange="atualizarMotor()" class="w-full bg-gray-800 text-green-300 rounded p-2 mb-2 border border-green-600"></select>
            <select id="almoco-veg" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 border border-gray-600"></select>
            <select id="almoco-tempero" onchange="atualizarMotor()" class="w-full bg-gray-800 text-yellow-300 rounded p-2 border border-yellow-600"></select>
        </div>

        <div id="step-pre" class="mb-8 border-l-4 border-orange-500 pl-4 opacity-50 pointer-events-none transition-all duration-300">
            <h2 class="text-lg font-bold text-orange-400 mb-3">3. Pré-Treino</h2>
            <select id="pre-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 border border-gray-600"></select>
            <select id="pre-fruta" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 border border-gray-600"></select>
            <select id="pre-bebida" onchange="atualizarMotor()" class="w-full bg-gray-800 text-blue-300 rounded p-2 border border-blue-600">
                <option value="">Bebida...</option>
                <option value="Agua ou Cafe">Água ou Café</option>
                <option value="Monster Zero">Monster Zero</option>
            </select>
        </div>

        <div id="step-janta" class="mb-6 border-l-4 border-indigo-500 pl-4 opacity-50 pointer-events-none transition-all duration-300">
            <h2 class="text-lg font-bold text-indigo-400 mb-1">4. Jantar</h2>
            <select id="janta-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 border border-gray-600"></select>
            <select id="janta-carb" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 border border-gray-600"></select>
            <select id="janta-folhas" onchange="atualizarMotor()" class="w-full bg-gray-800 text-green-300 rounded p-2 mb-2 border border-green-600"></select>
            <select id="janta-tempero" onchange="atualizarMotor()" class="w-full bg-gray-800 text-yellow-300 rounded p-2 mb-2 border border-yellow-600"></select>
            <select id="janta-fruta" onchange="finalizar()" class="w-full bg-gray-700 text-white rounded p-2 border border-gray-600"></select>
        </div>

        <div id="assinatura-imagem" class="hidden mt-6 text-center text-xs text-gray-500">
            Foco em Folhas e Definição | Meta: 65kg
        </div>
    </div>

    <div id="msg-sucesso" class="hidden max-w-md mx-auto text-center mt-4 px-4">
        <button onclick="salvarImagem()" class="w-full bg-green-500 text-gray-900 font-extrabold py-4 rounded-lg shadow-lg hover:bg-green-400 transition">
            📸 Salvar Cardápio
        </button>
    </div>

    <script>
        const nutri = {
            // Proteínas Principais (~140-150 kcal)
            "120g Sassami (Peso Cru)": { kcal: 143, prot: 26 },
            "150g Tilápia (Peso Cru)": { kcal: 144, prot: 30 },
            "1 Lata de Atum em Água": { kcal: 150, prot: 33 },
            "1 Lata de Sardinha (Escorrida)": { kcal: 150, prot: 17 },
            "2 Ovos Grandes": { kcal: 146, prot: 13 },
            "150g Iogurte Grego": { kcal: 140, prot: 11 },

            // Carboidratos Ajustados (~130-140 kcal)
            "150g Batata Inglesa": { kcal: 129, prot: 3 },
            "170g Batata Doce (Cozida)": { kcal: 130, prot: 2.2 },
            "100g Mandioca (Cozida)": { kcal: 125, prot: 0.6 },
            "100g Arroz Branco (Cozido)": { kcal: 130, prot: 2.5 },
            "1 Pão Francês (50g)": { kcal: 140, prot: 4.5 },
            "Zero Carbo": { kcal: 0, prot: 0 },

            // Folhas (Praticamente livres, volume alto)
            "Mix Alface e Rúcula (Livre)": { kcal: 15, prot: 1 },
            "150g Espinafre Cozido": { kcal: 34, prot: 4 },
            "100g Brócolis Cozido": { kcal: 35, prot: 3 },
            "150g Repolho Fatiado": { kcal: 37, prot: 1.5 },
            "150g Acelga": { kcal: 22, prot: 2 },

            // Vegetais de Volume/Sabor
            "90g Ora-pro-nóbis": { kcal: 36, prot: 2.7 },
            "145g Abobrinha": { kcal: 35, prot: 2 },
            "65g Tomate": { kcal: 10, prot: 0.6 },
            "100g Pepino": { kcal: 15, prot: 0.7 },
            "Zero Extra": { kcal: 0, prot: 0 },

            // Frutas (~60 kcal)
            "115g Maçã": { kcal: 60, prot: 0.3 },
            "160g Laranja": { kcal: 60, prot: 1.6 },
            "205g Melão": { kcal: 60, prot: 1.4 },
            "150g Mamão": { kcal: 60, prot: 0.7 },
            "65g Banana": { kcal: 60, prot: 0.8 },
            "Zero Fruta": { kcal: 0, prot: 0 },

            // Temperos
            "Cebola Inteira (100g)": { kcal: 40, prot: 1 },
            "Alho, Cebola e Sal (Misto)": { kcal: 10, prot: 0 },
            "Mostarda Amarela (15g)": { kcal: 10, prot: 0.5 },
            "Shoyu (15ml)": { kcal: 12, prot: 1 },
            "Monster Zero": { kcal: 10, prot: 0 },
            "Agua ou Cafe": { kcal: 0, prot: 0 }
        };

        const frutas = ["115g Maçã", "160g Laranja", "205g Melão", "150g Mamão", "65g Banana", "Zero Fruta"];
        const folhas = ["Mix Alface e Rúcula (Livre)", "150g Espinafre Cozido", "100g Brócolis Cozido", "150g Repolho Fatiado", "150g Acelga"];
        const carbos = ["150g Batata Inglesa", "170g Batata Doce (Cozida)", "100g Mandioca (Cozida)", "100g Arroz Branco (Cozido)", "1 Pão Francês (50g)", "Zero Carbo"];
        const temperos = ["Cebola Inteira (100g)", "Alho, Cebola e Sal (Misto)", "Mostarda Amarela (15g)", "Shoyu (15ml)"];

        function popularSelect(id, placeholder, opcoes) {
            const select = document.getElementById(id);
            const valorAtual = select.value;
            select.innerHTML = `<option value="">${placeholder}</option>` + opcoes.map(op => `<option value="${op}">${op}</option>`).join('');
            if(opcoes.includes(valorAtual)) select.value = valorAtual; 
        }

        window.onload = () => {
            popularSelect('cafe-prot', '1. Proteína Base...', ["120g Sassami (Peso Cru)", "150g Tilápia (Peso Cru)", "2 Ovos Grandes", "150g Iogurte Grego"]);
            popularSelect('cafe-carb', '2. Hidrato...', carbos);
            popularSelect('cafe-fruta', '3. Fruta...', frutas);
            popularSelect('cafe-tempero', '4. Tempero...', temperos);

            popularSelect('almoco-prot', '1. Proteína...', ["120g Sassami (Peso Cru)", "150g Tilápia (Peso Cru)", "1 Lata de Atum em Água"]);
            popularSelect('almoco-carb', '2. Hidrato...', carbos);
            popularSelect('almoco-folhas', '3. Folhas (Verdes)...', folhas);
            popularSelect('almoco-veg', '4. Vegetal Volume...', ["90g Ora-pro-nóbis", "145g Abobrinha", "65g Tomate", "100g Pepino", "Zero Extra"]);
            popularSelect('almoco-tempero', '5. Tempero...', temperos);

            popularSelect('pre-prot', '1. Proteína Leve...', ["2 Ovos Grandes", "150g Iogurte Grego"]);
            popularSelect('pre-fruta', '2. Fruta...', frutas);

            popularSelect('janta-prot', '1. Proteína...', ["120g Sassami (Peso Cru)", "150g Tilápia (Peso Cru)", "1 Lata de Sardinha (Escorrida)"]);
            popularSelect('janta-carb', '2. Hidrato...', carbos);
            popularSelect('janta-folhas', '3. Folhas (Verdes)...', folhas);
            popularSelect('janta-tempero', '4. Tempero...', temperos);
            popularSelect('janta-fruta', '5. Fruta...', frutas);
            
            atualizarMotor();
        }

        function calcularMacros() {
            let totalKcal = 0; let totalProt = 0;
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                if(select.value && nutri[select.value]) {
                    totalKcal += nutri[select.value].kcal;
                    totalProt += nutri[select.value].prot;
                }
            });
            document.getElementById('total-kcal').innerText = Math.round(totalKcal);
            document.getElementById('total-prot').innerText = Math.round(totalProt * 10) / 10;
        }

        function atualizarMotor() {
            const pCafe = document.getElementById('cafe-prot').value;
            if(pCafe) document.getElementById('step-almoco').classList.remove('opacity-50', 'pointer-events-none');
            const pAlmoco = document.getElementById('almoco-prot').value;
            if(pAlmoco) document.getElementById('step-pre').classList.remove('opacity-50', 'pointer-events-none');
            const pPre = document.getElementById('pre-prot').value;
            if(pPre) document.getElementById('step-janta').classList.remove('opacity-50', 'pointer-events-none');
            calcularMacros();
        }

        function finalizar() {
            document.getElementById('msg-sucesso').classList.remove('hidden');
            calcularMacros();
        }

        function salvarImagem() {
            const areaPrint = document.getElementById('area-print');
            const assinatura = document.getElementById('assinatura-imagem');
            assinatura.classList.remove('hidden');
            html2canvas(areaPrint, { backgroundColor: "#1f2937", scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Dieta-1550kcal.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                assinatura.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
