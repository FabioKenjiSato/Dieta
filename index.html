<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dieta 65kg - Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-32">

    <div class="fixed bottom-0 left-0 w-full bg-gray-950 border-t border-green-500 p-4 z-50 shadow-2xl flex justify-between items-center px-6 md:px-12">
        <div>
            <p class="text-xs text-gray-400">Total do Dia:</p>
            <p class="text-xl font-bold text-orange-400"><span id="total-kcal">0</span> <span class="text-sm">kcal</span></p>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-400">Proteína Diária</p>
            <p class="text-xl font-bold text-green-400"><span id="total-prot">0</span><span class="text-sm">g</span></p>
        </div>
    </div>

    <div id="area-print" class="max-w-md mx-auto bg-gray-800 rounded-xl shadow-lg p-6 border-t-4 border-green-500 mt-4 md:mt-8 relative">
        <h1 class="text-2xl font-bold text-green-400 mb-1">Cardápio Nivelado</h1>
        <p class="text-sm text-gray-400 mb-6">Meta 1700 kcal | Ovos Liberados | Daiso Curry Adicionado</p>

        <div class="mb-8 border-l-4 border-yellow-500 pl-4">
            <h2 class="text-lg font-bold text-yellow-400 mb-3">1. Café da Manhã</h2>
            <select id="cafe-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-yellow-400"></select>
            <select id="cafe-carb" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-yellow-400"></select>
            <select id="cafe-tempero" onchange="atualizarMotor()" class="w-full bg-gray-800 text-yellow-300 rounded p-2 mb-2 outline-none border border-yellow-600 focus:border-yellow-400"></select>
            <select id="cafe-fruta" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 outline-none border border-gray-600 focus:border-yellow-400"></select>
        </div>

        <div id="step-almoco" class="mb-8 border-l-4 border-blue-500 pl-4 transition-all duration-300">
            <h2 class="text-lg font-bold text-blue-400 mb-1">2. Almoço</h2>
            <select id="almoco-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-blue-400"></select>
            <select id="almoco-carb" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-blue-400"></select>
            <select id="almoco-folhas" onchange="atualizarMotor()" class="w-full bg-gray-800 text-green-300 rounded p-2 mb-2 outline-none border border-green-600 focus:border-green-400"></select>
            <select id="almoco-veg" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-blue-400"></select>
            <select id="almoco-tempero" onchange="atualizarMotor()" class="w-full bg-gray-800 text-yellow-300 rounded p-2 outline-none border border-yellow-600 focus:border-yellow-400"></select>
        </div>

        <div id="step-pre" class="mb-8 border-l-4 border-orange-500 pl-4 transition-all duration-300">
            <h2 class="text-lg font-bold text-orange-400 mb-3">3. Pré-Treino (Tarde)</h2>
            <select id="pre-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-orange-400"></select>
            <select id="pre-fruta" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-orange-400"></select>
            <select id="pre-bebida" onchange="atualizarMotor()" class="w-full bg-gray-800 text-blue-300 rounded p-2 outline-none border border-blue-600 focus:border-blue-400">
                <option value="">Bebida Pré-Treino...</option>
                <option value="Agua ou Cafe">Água ou Café Preto</option>
                <option value="Monster Zero">350ml Monster ZERO</option>
            </select>
        </div>

        <div id="step-janta" class="mb-6 border-l-4 border-indigo-500 pl-4 transition-all duration-300">
            <h2 class="text-lg font-bold text-indigo-400 mb-1">4. Janta (Pós-Treino)</h2>
            <select id="janta-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-indigo-400"></select>
            <select id="janta-carb" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-indigo-400"></select>
            <select id="janta-folhas" onchange="atualizarMotor()" class="w-full bg-gray-800 text-green-300 rounded p-2 mb-2 outline-none border border-green-600 focus:border-green-400"></select>
            <select id="janta-veg" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-indigo-400"></select>
            <select id="janta-tempero" onchange="atualizarMotor()" class="w-full bg-gray-800 text-yellow-300 rounded p-2 mb-2 outline-none border border-yellow-600 focus:border-yellow-400"></select>
            <select id="janta-fruta" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 outline-none border border-gray-600 focus:border-indigo-400"></select>
        </div>

        <div id="assinatura-imagem" class="hidden mt-6 text-center text-xs text-gray-500">
            Cardápio Fechado em 1700 kcal | 65kg
        </div>
    </div>

    <div class="max-w-md mx-auto text-center mt-4">
        <button onclick="salvarImagem()" class="w-full bg-green-500 text-gray-900 font-extrabold py-4 rounded-lg shadow-lg hover:bg-green-400 transition">
            Salvar Imagem do Cardápio
        </button>
    </div>

    <script>
        const nutri = {
            // Proteínas (~145 kcal)
            "120g Sassami (Peso Cru)": { kcal: 143, prot: 26 },
            "150g Tilápia (Peso Cru)": { kcal: 144, prot: 30 },
            "1 Lata de Atum em Água (Drenado)": { kcal: 150, prot: 33 },
            "1 Lata Sardinha (Drenada)": { kcal: 150, prot: 17 },
            "2 Ovos Grandes": { kcal: 146, prot: 13 },
            "150g Iogurte Grego": { kcal: 140, prot: 11 },
            
            // Carboidratos Base (~220 kcal)
            "250g Batata Inglesa": { kcal: 215, prot: 5 },
            "285g Batata Doce (Cozida)": { kcal: 220, prot: 3.7 },
            "175g Mandioca (Cozida)": { kcal: 218, prot: 1 },
            "450g Abóbora": { kcal: 216, prot: 4.5 },
            "1.5 Pão Francês (75g)": { kcal: 210, prot: 6.7 },
            "Zero Carbo": { kcal: 0, prot: 0 },
            
            // Carboidratos Almoço Alto Volume (~315 kcal)
            "365g Batata Inglesa": { kcal: 314, prot: 7.3 },
            "410g Batata Doce (Cozida)": { kcal: 315, prot: 5.3 },
            "250g Mandioca (Cozida)": { kcal: 312, prot: 1.5 },
            "650g Abóbora": { kcal: 312, prot: 6.5 },
            
            // Folhas Verdes Recomendadas (~25 kcal - Alto Volume)
            "200g Alface (Qualquer tipo)": { kcal: 28, prot: 2.5 },
            "150g Mix de Folhas (Alface, Rúcula, Agrião)": { kcal: 25, prot: 2 },
            "100g Rúcula": { kcal: 25, prot: 2.5 },
            "100g Agrião": { kcal: 22, prot: 2.3 },
            "150g Acelga": { kcal: 24, prot: 1.5 },
            "100g Espinafre": { kcal: 23, prot: 3 },
            "100g Couve-manteiga Fatiada": { kcal: 32, prot: 3 },
            "100g Repolho Fatiado": { kcal: 25, prot: 1 },
            
            // Outros Vegetais (~35 kcal) - Abobrinha incluída aqui
            "145g Abobrinha": { kcal: 35, prot: 2.2 },
            "100g Brócolis": { kcal: 35, prot: 3.5 },
            "100g Couve-flor": { kcal: 25, prot: 2 },
            "115g Berinjela": { kcal: 35, prot: 1.7 },
            "90g Ora-pro-nóbis": { kcal: 36, prot: 2.7 },
            "65g Tomate": { kcal: 10, prot: 0.6 },
            "100g Pepino": { kcal: 12, prot: 0.8 },
            "Zero Vegetais": { kcal: 0, prot: 0 },
            
            // Frutas (~60 kcal)
            "115g Maçã": { kcal: 60, prot: 0.3 },
            "160g Laranja": { kcal: 60, prot: 1.6 },
            "205g Melão": { kcal: 60, prot: 1.4 },
            "150g Mamão": { kcal: 60, prot: 0.7 },
            "65g Banana": { kcal: 60, prot: 0.8 },
            "Zero Fruta": { kcal: 0, prot: 0 },
            
            // Temperos Exatos em Gramas + Daiso Curry
            "10g Curry Japonês Daiso": { kcal: 50, prot: 1 },
            "100g Cebola Inteira + 5g Alho": { kcal: 45, prot: 1.2 },
            "50g Cebola (Meia) + 5g Alho": { kcal: 25, prot: 0.8 },
            "25g Cebola (1/4) + 5g Alho": { kcal: 15, prot: 0.4 },
            "15g Mostarda Amarela + 5g Pimenta": { kcal: 10, prot: 0.5 },
            "15g Molho Shoyu + 5g Gengibre": { kcal: 15, prot: 1 },
            "30g Suco de Limão + 5g Ervas Finas": { kcal: 10, prot: 0 },
            "0g Sem Tempero (Puro)": { kcal: 0, prot: 0 },
            
            "Agua ou Cafe": { kcal: 0, prot: 0 },
            "Monster Zero": { kcal: 10, prot: 0 }
        };

        const protPrincipal = ["120g Sassami (Peso Cru)", "150g Tilápia (Peso Cru)", "1 Lata de Atum em Água (Drenado)", "2 Ovos Grandes"];
        const protLeve = ["2 Ovos Grandes", "150g Iogurte Grego", "1 Lata Sardinha (Drenada)"];
        
        const carboBase = ["250g Batata Inglesa", "285g Batata Doce (Cozida)", "175g Mandioca (Cozida)", "450g Abóbora", "1.5 Pão Francês (75g)", "Zero Carbo"];
        const carboAlto = ["365g Batata Inglesa", "410g Batata Doce (Cozida)", "250g Mandioca (Cozida)", "650g Abóbora", "Zero Carbo"];
        
        const folhasVerdes = ["200g Alface (Qualquer tipo)", "150g Mix de Folhas (Alface, Rúcula, Agrião)", "100g Rúcula", "100g Agrião", "150g Acelga", "100g Espinafre", "100g Couve-manteiga Fatiada", "100g Repolho Fatiado"];
        const vegetais = ["145g Abobrinha", "100g Brócolis", "100g Couve-flor", "115g Berinjela", "90g Ora-pro-nóbis", "65g Tomate", "100g Pepino", "Zero Vegetais"];
        
        const frutasTotais = ["115g Maçã", "160g Laranja", "205g Melão", "150g Mamão", "65g Banana", "Zero Fruta"];
        
        const opcoesTempero = ["10g Curry Japonês Daiso", "100g Cebola Inteira + 5g Alho", "50g Cebola (Meia) + 5g Alho", "25g Cebola (1/4) + 5g Alho", "15g Mostarda Amarela + 5g Pimenta", "15g Molho Shoyu + 5g Gengibre", "30g Suco de Limão + 5g Ervas Finas", "0g Sem Tempero (Puro)"];

        function popularSelect(id, placeholder, opcoes) {
            const select = document.getElementById(id);
            const valorAtual = select.value;
            select.innerHTML = `<option value="">${placeholder}</option>` + opcoes.map(op => `<option value="${op}">${op}</option>`).join('');
            if(opcoes.includes(valorAtual)) select.value = valorAtual; 
        }

        window.onload = () => {
            popularSelect('cafe-prot', '1. Proteína (~145kcal)...', protPrincipal);
            popularSelect('cafe-carb', '2. Carboidrato (~220kcal)...', carboBase);
            popularSelect('cafe-tempero', '3. Tempero exato...', opcoesTempero);
            popularSelect('cafe-fruta', '4. Fruta (~60kcal)...', frutasTotais);
            
            popularSelect('almoco-prot', '1. Proteína (~145kcal)...', protPrincipal);
            popularSelect('almoco-carb', '2. Carboidrato Volume (~315kcal)...', carboAlto);
            popularSelect('almoco-folhas', '3. Folhas Volume (~25kcal)...', folhasVerdes);
            popularSelect('almoco-veg', '4. Vegetais Volume (~35kcal)...', vegetais);
            popularSelect('almoco-tempero', '5. Tempero exato...', opcoesTempero);
            
            popularSelect('pre-prot', '1. Proteína Leve (~145kcal)...', protLeve);
            popularSelect('pre-fruta', '2. Fruta (~60kcal)...', frutasTotais);
            
            popularSelect('janta-prot', '1. Proteína (~145kcal)...', protPrincipal);
            popularSelect('janta-carb', '2. Carboidrato (~220kcal)...', carboBase);
            popularSelect('janta-folhas', '3. Folhas Volume (~25kcal)...', folhasVerdes);
            popularSelect('janta-veg', '4. Vegetais Volume (~35kcal)...', vegetais);
            popularSelect('janta-tempero', '5. Tempero exato...', opcoesTempero);
            popularSelect('janta-fruta', '6. Fruta (~60kcal)...', frutasTotais);
            
            atualizarMotor();
        }

        function calcularMacros() {
            let totalKcal = 0;
            let totalProt = 0;
            
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                if(select.value && nutri[select.value]) {
                    totalKcal += nutri[select.value].kcal;
                    totalProt += nutri[select.value].prot;
                }
            });

            document.getElementById('total-kcal').innerText = Math.round(totalKcal);
            document.getElementById('total-prot').innerText = Math.round(totalProt * 10) / 10;
        }

        function atualizarMotor() {
            calcularMacros();
        }

        function salvarImagem() {
            const areaPrint = document.getElementById('area-print');
            const assinatura = document.getElementById('assinatura-imagem');
            
            assinatura.classList.remove('hidden');

            html2canvas(areaPrint, {
                backgroundColor: "#1f2937",
                scale: 2 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Cardapio-Tracker-1700kcal.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                assinatura.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
