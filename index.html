<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dieta 65kg - Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-32">

    <div class="fixed bottom-0 left-0 w-full bg-gray-950 border-t border-green-500 p-4 z-50 shadow-2xl flex justify-between items-center px-6 md:px-12">
        <div>
            <p class="text-xs text-gray-400">Total do Dia:</p>
            <p class="text-xl font-bold text-orange-400"><span id="total-kcal">0</span> <span class="text-sm">kcal</span></p>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-400">Proteína Diária</p>
            <p class="text-xl font-bold text-green-400"><span id="total-prot">0</span><span class="text-sm">g</span></p>
        </div>
    </div>

    <div id="area-print" class="max-w-md mx-auto bg-gray-800 rounded-xl shadow-lg p-6 border-t-4 border-green-500 mt-4 md:mt-8 relative">
        <h1 class="text-2xl font-bold text-green-400 mb-1">Cardápio Nivelado</h1>
        <p class="text-sm text-gray-400 mb-6">1600-1700 kcal | Carbos Mistos | Sem Carne Vermelha</p>

        <div class="mb-8 border-l-4 border-yellow-500 pl-4">
            <h2 class="text-lg font-bold text-yellow-400 mb-3">1. Pequeno-Almoço</h2>
            
            <select id="cafe-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-yellow-400"></select>

            <select id="cafe-carb" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-yellow-400"></select>

            <select id="cafe-gordura" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-yellow-400"></select>

            <select id="cafe-fruta" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 outline-none border border-gray-600 focus:border-yellow-400"></select>
        </div>

        <div id="step-almoco" class="mb-8 border-l-4 border-blue-500 pl-4 opacity-50 pointer-events-none transition-all duration-300">
            <h2 class="text-lg font-bold text-blue-400 mb-1">2. Almoço</h2>

            <select id="almoco-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-blue-400"></select>

            <select id="almoco-carb" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-blue-400"></select>

            <select id="almoco-folhas" onchange="atualizarMotor()" class="w-full bg-gray-800 text-green-300 rounded p-2 mb-2 outline-none border border-green-600 focus:border-green-400"></select>

            <select id="almoco-veg" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-blue-400"></select>

            <select id="almoco-sabor" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-blue-400"></select>

            <select id="almoco-tempero" onchange="atualizarMotor()" class="w-full bg-gray-800 text-yellow-300 rounded p-2 outline-none border border-yellow-600 focus:border-yellow-400"></select>
        </div>

        <div id="step-pre" class="mb-8 border-l-4 border-orange-500 pl-4 opacity-50 pointer-events-none transition-all duration-300">
            <h2 class="text-lg font-bold text-orange-400 mb-3">3. Pré-Treino (Tarde)</h2>

            <select id="pre-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-orange-400"></select>

            <select id="pre-gordura" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-orange-400"></select>

            <select id="pre-fruta" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-orange-400"></select>

            <select id="pre-bebida" onchange="atualizarMotor()" class="w-full bg-gray-800 text-blue-300 rounded p-2 outline-none border border-blue-600 focus:border-blue-400">
                <option value="">Bebida Pré-Treino...</option>
                <option value="Agua ou Cafe">Água ou Café Preto</option>
                <option value="Monster Zero">Monster ZERO (Branco/Ultra)</option>
            </select>
        </div>

        <div id="step-janta" class="mb-6 border-l-4 border-indigo-500 pl-4 opacity-50 pointer-events-none transition-all duration-300">
            <h2 class="text-lg font-bold text-indigo-400 mb-1">4. Jantar (Pós-Treino)</h2>

            <select id="janta-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-indigo-400"></select>
            
            <select id="janta-carb" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-indigo-400"></select>

            <select id="janta-folhas" onchange="atualizarMotor()" class="w-full bg-gray-800 text-green-300 rounded p-2 mb-2 outline-none border border-green-600 focus:border-green-400"></select>

            <select id="janta-veg" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-indigo-400"></select>

            <select id="janta-sabor" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-indigo-400"></select>

            <select id="janta-tempero" onchange="atualizarMotor()" class="w-full bg-gray-800 text-yellow-300 rounded p-2 mb-2 outline-none border border-yellow-600 focus:border-yellow-400"></select>

            <select id="janta-fruta" onchange="finalizar()" class="w-full bg-gray-700 text-white rounded p-2 outline-none border border-gray-600 focus:border-indigo-400"></select>
        </div>

        <div id="assinatura-imagem" class="hidden mt-6 text-center text-xs text-gray-500">
            Meta 1600-1700 kcal | Foco em Definição e Volume Lower
        </div>
    </div>

    <div id="msg-sucesso" class="hidden max-w-md mx-auto text-center mt-4">
        <button onclick="salvarImagem()" class="w-full bg-green-500 text-gray-900 font-extrabold py-4 rounded-lg shadow-lg hover:bg-green-400 transition">
            Salvar Imagem na Galeria
        </button>
    </div>

    <script>
        // BANCO DE DADOS NIVELADO (1600 - 1700 kcal)
        const nutri = {
            // Proteínas Principais (~145 kcal)
            "120g Sassami (Peso Cru)": { kcal: 143, prot: 26 },
            "150g Tilápia (Peso Cru)": { kcal: 144, prot: 30 },
            "1 Lata de Atum em Água": { kcal: 150, prot: 33 },
            
            // Proteínas Leves/Extras (~145 kcal)
            "2 Ovos Grandes": { kcal: 146, prot: 13 },
            "150g Iogurte Grego": { kcal: 140, prot: 11 },
            "1 Lata de Sardinha (Escorrida)": { kcal: 150, prot: 17 },
            "1 Dose Whey Protein": { kcal: 120, prot: 24 },
            
            // Carboidratos Normais (~150 kcal) - Café e Janta
            "175g Batata Inglesa": { kcal: 150, prot: 3.5 },
            "115g Arroz Branco (Cozido)": { kcal: 150, prot: 3 },
            "Misto: 55g Arroz + 100g Feijão": { kcal: 147, prot: 6 },
            "Misto: 85g Batata + 100g Feijão": { kcal: 149, prot: 6.5 },
            "Misto: 85g Batata + 55g Arroz": { kcal: 144, prot: 3.2 },
            "1 Pão Francês (50g)": { kcal: 140, prot: 4.5 },
            "Zero Carbo": { kcal: 0, prot: 0 },
            
            // Carbos Almoço Alto (~250 kcal)
            "290g Batata Inglesa": { kcal: 250, prot: 5.8 },
            "190g Arroz Branco (Cozido)": { kcal: 247, prot: 4.7 },
            "Misto: 95g Arroz + 160g Feijão": { kcal: 244, prot: 9.5 },
            "Misto: 145g Batata + 95g Arroz": { kcal: 248, prot: 5.9 },
            "Misto: 145g Batata + 160g Feijão": { kcal: 246, prot: 10.5 },
            "70g Macarrão (Peso Cru)": { kcal: 245, prot: 7.7 },
            "Zero Carbo": { kcal: 0, prot: 0 },
            
            // Gorduras / Extras (~100 kcal)
            "1 Colher Sopa (12g) Azeite": { kcal: 108, prot: 0 },
            "15g Pasta de Amendoim": { kcal: 90, prot: 4 },
            "30g Queijo Mussarela": { kcal: 96, prot: 7 },
            "15g Castanhas ou Nozes": { kcal: 90, prot: 2 },
            "Zero Extra": { kcal: 0, prot: 0 },
            
            // Folhas Verdes Livres (~15 a 30 kcal)
            "Mix de Alface, Rúcula e Agrião": { kcal: 15, prot: 1 },
            "150g Repolho Fatiado": { kcal: 35, prot: 1.5 },
            "150g Couve Manteiga Refogada": { kcal: 45, prot: 3 },
            "150g Acelga ou Espinafre": { kcal: 30, prot: 2 },
            
            // Vegetais Volume (Todas ~35 kcal)
            "90g Ora-pro-nóbis": { kcal: 36, prot: 2.7 },
            "100g Brócolis": { kcal: 35, prot: 3.5 },
            "100g Couve-flor": { kcal: 35, prot: 3 },
            "145g Abobrinha": { kcal: 35, prot: 2.2 },
            "115g Berinjela": { kcal: 35, prot: 1.7 },
            
            // Vegetais Salada/Sabor (Todas ~10 kcal)
            "65g Tomate": { kcal: 10, prot: 0.6 },
            "30g Cenoura Ralada": { kcal: 10, prot: 0.3 },
            "30g Beterraba": { kcal: 10, prot: 0.3 },
            "100g Pepino": { kcal: 10, prot: 0.5 },
            "50g Pimentão": { kcal: 10, prot: 0.5 },
            "Zero Salada Extra": { kcal: 0, prot: 0 },
            
            // Frutas Cotadas (Todas ~60 kcal)
            "115g Maçã": { kcal: 60, prot: 0.3 },
            "160g Laranja": { kcal: 60, prot: 1.6 },
            "130g Ameixa": { kcal: 60, prot: 1 },
            "115g Pera": { kcal: 60, prot: 0.5 },
            "100g Manga": { kcal: 60, prot: 0.5 },
            "85g Caqui": { kcal: 60, prot: 0.3 },
            "205g Melão": { kcal: 60, prot: 1.4 },
            "150g Mamão": { kcal: 60, prot: 0.7 },
            "65g Banana": { kcal: 60, prot: 0.8 },
            "Zero Fruta": { kcal: 0, prot: 0 },
            
            // TEMPEROS COM PESO EXATO
            "100g Cebola Inteira + 5g Alho/Sal": { kcal: 45, prot: 1.2 },
            "25g Cebola (1/4) + 5g Alho/Sal": { kcal: 15, prot: 0.4 },
            "5g Fio de Azeite + 5g Páprica": { kcal: 50, prot: 0 },
            "15g Mostarda Amarela + 5g Pimenta": { kcal: 10, prot: 0.5 },
            "15g Molho Shoyu + 5g Gengibre": { kcal: 15, prot: 1 },
            "30g Suco de Limão + 5g Ervas Finas": { kcal: 10, prot: 0 },
            "0g Sem Tempero (Puro)": { kcal: 0, prot: 0 },
            
            "Agua ou Cafe": { kcal: 0, prot: 0 },
            "Monster Zero": { kcal: 10, prot: 0 }
        };

        const protBase = ["120g Sassami (Peso Cru)", "150g Tilápia (Peso Cru)", "1 Lata de Atum em Água"];
        const protLeve = ["2 Ovos Grandes", "150g Iogurte Grego", "1 Lata de Sardinha (Escorrida)", "1 Dose Whey Protein"];
        
        const carboNormal = ["175g Batata Inglesa", "115g Arroz Branco (Cozido)", "Misto: 55g Arroz + 100g Feijão", "Misto: 85g Batata + 100g Feijão", "Misto: 85g Batata + 55g Arroz", "1 Pão Francês (50g)", "Zero Carbo"];
        
        const carboAlto = ["290g Batata Inglesa", "190g Arroz Branco (Cozido)", "Misto: 95g Arroz + 160g Feijão", "Misto: 145g Batata + 95g Arroz", "Misto: 145g Batata + 160g Feijão", "70g Macarrão (Peso Cru)", "Zero Carbo"];
        
        const gorduras = ["1 Colher Sopa (12g) Azeite", "15g Pasta de Amendoim", "30g Queijo Mussarela", "15g Castanhas ou Nozes", "Zero Extra"];
        
        const folhasVerdes = ["Mix de Alface, Rúcula e Agrião", "150g Repolho Fatiado", "150g Couve Manteiga Refogada", "150g Acelga ou Espinafre"];
        const vegVolume = ["90g Ora-pro-nóbis", "100g Brócolis", "100g Couve-flor", "145g Abobrinha", "115g Berinjela"];
        const vegSabor = ["65g Tomate", "30g Cenoura Ralada", "30g Beterraba", "100g Pepino", "50g Pimentão", "Zero Salada Extra"];
        
        const frutasTotais = ["115g Maçã", "160g Laranja", "130g Ameixa", "115g Pera", "100g Manga", "85g Caqui", "205g Melão", "150g Mamão", "65g Banana", "Zero Fruta"];
        
        const opcoesTempero = ["100g Cebola Inteira + 5g Alho/Sal", "25g Cebola (1/4) + 5g Alho/Sal", "5g Fio de Azeite + 5g Páprica", "15g Mostarda Amarela + 5g Pimenta", "15g Molho Shoyu + 5g Gengibre", "30g Suco de Limão + 5g Ervas Finas", "0g Sem Tempero (Puro)"];

        function popularSelect(id, placeholder, opcoes) {
            const select = document.getElementById(id);
            const valorAtual = select.value;
            select.innerHTML = `<option value="">${placeholder}</option>` + opcoes.map(op => `<option value="${op}">${op}</option>`).join('');
            if(opcoes.includes(valorAtual)) select.value = valorAtual; 
        }

        window.onload = () => {
            popularSelect('cafe-prot', '1. Proteína Base (~145kcal)...', protBase);
            popularSelect('cafe-carb', '2. Carboidrato Normal (~150kcal)...', carboNormal);
            popularSelect('cafe-gordura', '3. Gordura/Extra (~100kcal)...', gorduras);
            popularSelect('cafe-fruta', '4. Fruta Nivelada (~60kcal)...', frutasTotais);
            
            popularSelect('almoco-prot', '1. Proteína Base (~145kcal)...', protBase);
            popularSelect('almoco-carb', '2. Carboidrato Alto (~250kcal)...', carboAlto);
            popularSelect('almoco-folhas', '3. Folhas Verdes (Vontade Livre)...', folhasVerdes);
            popularSelect('almoco-veg', '4. Vegetal Volume (~35kcal)...', vegVolume);
            popularSelect('almoco-sabor', '5. Salada extra (~10kcal)...', vegSabor);
            popularSelect('almoco-tempero', '6. Tempero com Peso...', opcoesTempero);
            
            popularSelect('pre-prot', '1. Proteína Leve (~145kcal)...', protLeve);
            popularSelect('pre-gordura', '2. Gordura/Extra (~100kcal)...', gorduras);
            popularSelect('pre-fruta', '3. Fruta Nivelada (~60kcal)...', frutasTotais);
            
            popularSelect('janta-prot', '1. Proteína Base (~145kcal)...', protBase);
            popularSelect('janta-carb', '2. Carboidrato Normal (~150kcal)...', carboNormal);
            popularSelect('janta-folhas', '3. Folhas Verdes (Vontade Livre)...', folhasVerdes);
            popularSelect('janta-veg', '4. Vegetal Volume (~35kcal)...', vegVolume);
            popularSelect('janta-sabor', '5. Salada extra (~10kcal)...', vegSabor);
            popularSelect('janta-tempero', '6. Tempero com Peso...', opcoesTempero);
            popularSelect('janta-fruta', '7. Fruta Nivelada (~60kcal)...', frutasTotais);
            
            atualizarMotor();
        }

        function calcularMacros() {
            let totalKcal = 0;
            let totalProt = 0;
            
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                if(select.value && nutri[select.value]) {
                    totalKcal += nutri[select.value].kcal;
                    totalProt += nutri[select.value].prot;
                }
            });

            document.getElementById('total-kcal').innerText = Math.round(totalKcal);
            document.getElementById('total-prot').innerText = Math.round(totalProt * 10) / 10;
        }

        function atualizarMotor() {
            const pCafe = document.getElementById('cafe-prot').value;
            const cCafe = document.getElementById('cafe-carb').value;
            const gCafe = document.getElementById('cafe-gordura').value;
            const fCafe = document.getElementById('cafe-fruta').value;

            if(pCafe && cCafe && gCafe && fCafe) {
                document.getElementById('step-almoco').classList.remove('opacity-50', 'pointer-events-none');
            }

            const pAlmoco = document.getElementById('almoco-prot').value;
            const cAlmoco = document.getElementById('almoco-carb').value;
            const foAlmoco = document.getElementById('almoco-folhas').value;
            const vAlmoco = document.getElementById('almoco-veg').value;
            const sAlmoco = document.getElementById('almoco-sabor').value;
            const tAlmoco = document.getElementById('almoco-tempero').value;

            if(pAlmoco && cAlmoco && foAlmoco && vAlmoco && sAlmoco && tAlmoco) {
                document.getElementById('step-pre').classList.remove('opacity-50', 'pointer-events-none');
            }

            const pPre = document.getElementById('pre-prot').value;
            const gPre = document.getElementById('pre-gordura').value;
            const fPre = document.getElementById('pre-fruta').value;
            const bPre = document.getElementById('pre-bebida').value; 

            if(pPre && gPre && fPre && bPre) {
                document.getElementById('step-janta').classList.remove('opacity-50', 'pointer-events-none');
            }

            calcularMacros();
        }

        function finalizar() {
            const pJanta = document.getElementById('janta-prot').value;
            const cJanta = document.getElementById('janta-carb').value;
            const foJanta = document.getElementById('janta-folhas').value;
            const vJanta = document.getElementById('janta-veg').value;
            const sJanta = document.getElementById('janta-sabor').value;
            const tJanta = document.getElementById('janta-tempero').value;
            const fJanta = document.getElementById('janta-fruta').value;

            if(pJanta && cJanta && foJanta && vJanta && sJanta && tJanta && fJanta) {
                document.getElementById('msg-sucesso').classList.remove('hidden');
            }
            calcularMacros();
        }

        function salvarImagem() {
            const areaPrint = document.getElementById('area-print');
            const assinatura = document.getElementById('assinatura-imagem');
            
            assinatura.classList.remove('hidden');

            html2canvas(areaPrint, {
                backgroundColor: "#1f2937",
                scale: 2 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Dieta-Tracker-1600kcal.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                assinatura.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
