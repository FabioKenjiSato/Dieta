<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dieta 65kg - Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-32">

    <div class="fixed bottom-0 left-0 w-full bg-gray-950 border-t border-green-500 p-4 z-50 shadow-2xl flex justify-between items-center px-6 md:px-12">
        <div>
            <p class="text-xs text-gray-400">Total do Dia:</p>
            <p class="text-xl font-bold text-orange-400"><span id="total-kcal">0</span> <span class="text-sm">kcal</span></p>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-400">Proteína Diária</p>
            <p class="text-xl font-bold text-green-400"><span id="total-prot">0</span><span class="text-sm">g</span></p>
        </div>
    </div>

    <div id="area-print" class="max-w-md mx-auto bg-gray-800 rounded-xl shadow-lg p-6 border-t-4 border-green-500 mt-4 md:mt-8 relative">
        <h1 class="text-2xl font-bold text-green-400 mb-1">Cardápio Nivelado</h1>
        <p class="text-sm text-gray-400 mb-6">Os pesos foram ajustados para as calorias baterem iguais.</p>

        <div class="mb-8 border-l-4 border-yellow-500 pl-4">
            <h2 class="text-lg font-bold text-yellow-400 mb-3">☕ 1. Café da Manhã</h2>
            
            <select id="cafe-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-yellow-400">
                <option value="">1. Proteína Base (~143 kcal)...</option>
                <option value="120g Sassami (Peso Cru)">120g Sassami (Peso Cru)</option>
                <option value="150g Tilápia (Peso Cru)">150g Tilápia (Peso Cru)</option>
            </select>

            <select id="cafe-carb" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-yellow-400">
                <option value="">2. Carboidrato (~130 kcal)...</option>
                <option value="Zero Carbo">Zero Carbo (Deixa o peso pro almoço)</option>
                <option value="1 Pão Francês (50g)">1 Pão Francês (50g)</option>
                <option value="150g Batata Inglesa">150g Batata Inglesa</option>
                <option value="170g Batata Doce">170g Batata Doce</option>
                <option value="105g Mandioca">105g Mandioca</option>
                <option value="270g Abóbora">270g Abóbora</option>
            </select>

            <select id="cafe-tempero" onchange="atualizarMotor()" class="w-full bg-gray-800 text-yellow-300 rounded p-2 mb-2 outline-none border border-yellow-600 focus:border-yellow-400"></select>

            <select id="cafe-fruta" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 outline-none border border-gray-600 focus:border-yellow-400"></select>
        </div>

        <div id="step-almoco" class="mb-8 border-l-4 border-blue-500 pl-4 opacity-50 pointer-events-none transition-all duration-300">
            <h2 class="text-lg font-bold text-blue-400 mb-1">☀️ 2. Almoço</h2>

            <select id="almoco-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-blue-400"></select>

            <select id="almoco-carb" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-blue-400"></select>

            <select id="almoco-veg" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-blue-400"></select>

            <select id="almoco-sabor" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-blue-400"></select>

            <select id="almoco-tempero" onchange="atualizarMotor()" class="w-full bg-gray-800 text-yellow-300 rounded p-2 mb-2 outline-none border border-yellow-600 focus:border-yellow-400"></select>

            <select id="almoco-fruta" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 outline-none border border-gray-600 focus:border-blue-400"></select>
        </div>

        <div id="step-pre" class="mb-8 border-l-4 border-orange-500 pl-4 opacity-50 pointer-events-none transition-all duration-300">
            <h2 class="text-lg font-bold text-orange-400 mb-3">⚡ 3. Pré-Treino (Tarde)</h2>

            <select id="pre-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-orange-400"></select>

            <select id="pre-fruta" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-orange-400"></select>

            <select id="pre-bebida" onchange="atualizarMotor()" class="w-full bg-gray-800 text-blue-300 rounded p-2 outline-none border border-blue-600 focus:border-blue-400">
                <option value="">3. Bebida Pré-Treino...</option>
                <option value="Agua ou Cafe">Água ou Café Preto</option>
                <option value="Monster Zero">Monster ZERO (Branco/Ultra)</option>
            </select>
        </div>

        <div id="step-janta" class="mb-6 border-l-4 border-indigo-500 pl-4 opacity-50 pointer-events-none transition-all duration-300">
            <h2 class="text-lg font-bold text-indigo-400 mb-1">🌙 4. Janta (Pós-Treino)</h2>

            <select id="janta-prot" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-indigo-400"></select>

            <select id="janta-veg" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-indigo-400"></select>

            <select id="janta-sabor" onchange="atualizarMotor()" class="w-full bg-gray-700 text-white rounded p-2 mb-2 outline-none border border-gray-600 focus:border-indigo-400"></select>

            <select id="janta-tempero" onchange="atualizarMotor()" class="w-full bg-gray-800 text-yellow-300 rounded p-2 mb-2 outline-none border border-yellow-600 focus:border-yellow-400"></select>

            <select id="janta-fruta" onchange="finalizar()" class="w-full bg-gray-700 text-white rounded p-2 outline-none border border-gray-600 focus:border-indigo-400"></select>
        </div>

        <div id="assinatura-imagem" class="hidden mt-6 text-center text-xs text-gray-500">
            Cotas Calóricas Niveladas | Meta: 65kg
        </div>
    </div>

    <div id="msg-sucesso" class="hidden max-w-md mx-auto text-center mt-4">
        <button onclick="salvarImagem()" class="w-full bg-green-500 text-gray-900 font-extrabold py-4 rounded-lg shadow-lg hover:bg-green-400 transition">
            📸 Salvar Imagem na Galeria
        </button>
    </div>

    <script>
        // BANCO DE DADOS NIVELADO (Porcentagens Exatas TACO)
        const nutri = {
            // Proteínas Pesadas (~143 kcal)
            "120g Sassami (Peso Cru)": { kcal: 143, prot: 26 },
            "150g Tilápia (Peso Cru)": { kcal: 144, prot: 30 },
            
            // Proteínas Leves (~145 kcal)
            "1 Lata Sardinha": { kcal: 160, prot: 20 },
            "2 Ovos Grandes": { kcal: 146, prot: 13 },
            "150g Iogurte Grego": { kcal: 140, prot: 11 },
            
            // Carboidratos (Base 130 kcal)
            "Zero Carbo": { kcal: 0, prot: 0 },
            "1 Pão Francês (50g)": { kcal: 140, prot: 4.5 },
            "150g Batata Inglesa": { kcal: 129, prot: 3 },
            "170g Batata Doce": { kcal: 130, prot: 2.2 },
            "105g Mandioca": { kcal: 131, prot: 0.6 },
            "270g Abóbora": { kcal: 130, prot: 2.7 },
            
            // Carbos Almoço (Corte/Baixo ~65 kcal)
            "75g Batata Inglesa (-Corte)": { kcal: 65, prot: 1.5 },
            "85g Batata Doce (-Corte)": { kcal: 65, prot: 1.1 },
            "50g Mandioca (-Corte)": { kcal: 63, prot: 0.3 },
            "135g Abóbora (-Corte)": { kcal: 65, prot: 1.3 },
            
            // Carbos Almoço (Bônus/Alto ~195 kcal)
            "225g Batata Inglesa (+Bônus)": { kcal: 194, prot: 4.5 },
            "250g Batata Doce (+Bônus)": { kcal: 192, prot: 3.2 },
            "155g Mandioca (+Bônus)": { kcal: 194, prot: 0.9 },
            "400g Abóbora (+Bônus)": { kcal: 192, prot: 4 },
            
            // Vegetais Volume (Todas ~35 kcal)
            "90g Ora-pro-nóbis": { kcal: 36, prot: 2.7 },
            "140g Acelga": { kcal: 35, prot: 1.4 },
            "100g Repolho Branco": { kcal: 35, prot: 1 },
            "100g Brócolis": { kcal: 35, prot: 3.5 },
            "100g Couve-flor": { kcal: 35, prot: 3 },
            "115g Espinafre": { kcal: 35, prot: 4.6 },
            "145g Abobrinha": { kcal: 35, prot: 2.2 },
            "115g Berinjela": { kcal: 35, prot: 1.7 },
            
            // Vegetais Salada/Sabor (Todas ~10 kcal)
            "65g Tomate": { kcal: 10, prot: 0.6 },
            "30g Cenoura Ralada": { kcal: 10, prot: 0.3 },
            "30g Beterraba": { kcal: 10, prot: 0.3 },
            "100g Pepino": { kcal: 10, prot: 0.5 },
            "70g Rabanete": { kcal: 10, prot: 0.5 },
            "50g Pimentão": { kcal: 10, prot: 0.5 },
            "Zero Extra": { kcal: 0, prot: 0 },
            
            // Frutas Cotadas (Todas ~60 kcal)
            "115g Maçã": { kcal: 60, prot: 0.3 },
            "160g Laranja": { kcal: 60, prot: 1.6 },
            "130g Ameixa": { kcal: 60, prot: 1 },
            "115g Pera": { kcal: 60, prot: 0.5 },
            "100g Manga": { kcal: 60, prot: 0.5 },
            "85g Caqui": { kcal: 60, prot: 0.3 },
            "205g Melão": { kcal: 60, prot: 1.4 },
            "150g Mamão": { kcal: 60, prot: 0.7 },
            "65g Banana": { kcal: 60, prot: 0.8 },
            
            "Alho, Cebola e Sal (Clássico)": { kcal: 5, prot: 0 },
            "10g Curry Japonês Daiso": { kcal: 50, prot: 1 },
            "Limão, Pimenta do Reino e Orégano": { kcal: 5, prot: 0 },
            "Páprica Defumada e Fio de Azeite": { kcal: 45, prot: 0 },
            "Açafrão e Cheiro Verde": { kcal: 5, prot: 0 },
            "Sem Tempero (Puro)": { kcal: 0, prot: 0 },
            
            "Agua ou Cafe": { kcal: 0, prot: 0 },
            "Monster Zero": { kcal: 10, prot: 0 }
        };

        const frutasTotais = ["115g Maçã", "160g Laranja", "130g Ameixa", "115g Pera", "100g Manga", "85g Caqui", "205g Melão", "150g Mamão", "65g Banana"];
        const vegVolume = ["90g Ora-pro-nóbis", "140g Acelga", "100g Repolho Branco", "100g Brócolis", "100g Couve-flor", "115g Espinafre", "145g Abobrinha", "115g Berinjela"];
        const vegSabor = ["65g Tomate", "30g Cenoura Ralada", "30g Beterraba", "100g Pepino", "70g Rabanete", "50g Pimentão", "Zero Extra"];
        const opcoesTempero = ["Alho, Cebola e Sal (Clássico)", "10g Curry Japonês Daiso", "Limão, Pimenta do Reino e Orégano", "Páprica Defumada e Fio de Azeite", "Açafrão e Cheiro Verde", "Sem Tempero (Puro)"];

        function popularSelect(id, placeholder, opcoes) {
            const select = document.getElementById(id);
            const valorAtual = select.value;
            select.innerHTML = `<option value="">${placeholder}</option>` + opcoes.map(op => `<option value="${op}">${op}</option>`).join('');
            if(opcoes.includes(valorAtual)) select.value = valorAtual; 
        }

        window.onload = () => {
            popularSelect('cafe-tempero', '3. Tempero...', opcoesTempero);
            popularSelect('cafe-fruta', '4. Fruta Cotada (~60kcal)...', frutasTotais);
            
            popularSelect('almoco-veg', '3. Vegetal Volume (~35kcal)...', vegVolume);
            popularSelect('almoco-sabor', '4. Salada extra (~10kcal)...', vegSabor);
            popularSelect('almoco-tempero', '5. Tempero da Panela...', opcoesTempero);
            popularSelect('almoco-fruta', '6. Fruta Cotada (~60kcal)...', frutasTotais);
            
            popularSelect('pre-fruta', '2. Fruta Cotada (~60kcal)...', frutasTotais);
            
            popularSelect('janta-veg', '2. Vegetal Volume (~35kcal)...', vegVolume);
            popularSelect('janta-sabor', '3. Salada extra (~10kcal)...', vegSabor);
            popularSelect('janta-tempero', '4. Tempero da Panela...', opcoesTempero);
            popularSelect('janta-fruta', '5. Fruta Cotada (~60kcal)...', frutasTotais);
            
            atualizarMotor();
        }

        function calcularMacros() {
            let totalKcal = 0;
            let totalProt = 0;
            
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                if(select.value && nutri[select.value]) {
                    totalKcal += nutri[select.value].kcal;
                    totalProt += nutri[select.value].prot;
                }
            });

            document.getElementById('total-kcal').innerText = Math.round(totalKcal);
            document.getElementById('total-prot').innerText = Math.round(totalProt * 10) / 10;
        }

        function atualizarMotor() {
            const pCafe = document.getElementById('cafe-prot').value;
            const cCafe = document.getElementById('cafe-carb').value;
            const tCafe = document.getElementById('cafe-tempero').value;
            const fCafe = document.getElementById('cafe-fruta').value;

            const pAlmoco = document.getElementById('almoco-prot').value;
            const cAlmoco = document.getElementById('almoco-carb').value;
            const vAlmoco = document.getElementById('almoco-veg').value;
            const sAlmoco = document.getElementById('almoco-sabor').value;
            const tAlmoco = document.getElementById('almoco-tempero').value;
            const fAlmoco = document.getElementById('almoco-fruta').value;

            if(pCafe && cCafe && tCafe && fCafe) {
                document.getElementById('step-almoco').classList.remove('opacity-50', 'pointer-events-none');
            }

            let protDisponiveisAlmoco = ["120g Sassami (Peso Cru)", "150g Tilápia (Peso Cru)"];
            popularSelect('almoco-prot', '1. Proteína Base (~143kcal)...', protDisponiveisAlmoco);

            // MOTOR DINÂMICO DE CARBOIDRATOS
            let carbosAlmoco = [];
            
            if(cCafe && cCafe.includes("Zero")) {
                carbosAlmoco = [
                    "Zero Carbo",
                    "225g Batata Inglesa (+Bônus)",
                    "250g Batata Doce (+Bônus)",
                    "155g Mandioca (+Bônus)",
                    "400g Abóbora (+Bônus)"
                ];
            } else if (cCafe && cCafe.includes("Pão")) {
                carbosAlmoco = [
                    "Zero Carbo",
                    "75g Batata Inglesa (-Corte)",
                    "85g Batata Doce (-Corte)",
                    "50g Mandioca (-Corte)",
                    "135g Abóbora (-Corte)"
                ];
            } else {
                carbosAlmoco = [
                    "Zero Carbo",
                    "150g Batata Inglesa",
                    "170g Batata Doce",
                    "105g Mandioca",
                    "270g Abóbora"
                ];
            }
            popularSelect('almoco-carb', '2. Carboidrato Nivelado...', carbosAlmoco);

            if(pAlmoco && cAlmoco && vAlmoco && sAlmoco && tAlmoco && fAlmoco) {
                document.getElementById('step-pre').classList.remove('opacity-50', 'pointer-events-none');
            }

            popularSelect('pre-prot', '1. Proteína Leve (~145kcal)...', ["2 Ovos Grandes", "150g Iogurte Grego"]);
            const pPre = document.getElementById('pre-prot').value;
            const fPre = document.getElementById('pre-fruta').value;
            const bPre = document.getElementById('pre-bebida').value; 

            if(pPre && fPre && bPre) {
                document.getElementById('step-janta').classList.remove('opacity-50', 'pointer-events-none');
            }

            let protDisponiveisJanta = ["2 Ovos Grandes", "150g Iogurte Grego", "1 Lata Sardinha"].filter(p => p !== pPre); 
            popularSelect('janta-prot', '1. Proteína Base (~145kcal)...', protDisponiveisJanta);

            calcularMacros();
        }

        function finalizar() {
            const pJanta = document.getElementById('janta-prot').value;
            const vJanta = document.getElementById('janta-veg').value;
            const sJanta = document.getElementById('janta-sabor').value;
            const tJanta = document.getElementById('janta-tempero').value;
            const fJanta = document.getElementById('janta-fruta').value;

            if(pJanta && vJanta && sJanta && tJanta && fJanta) {
                document.getElementById('msg-sucesso').classList.remove('hidden');
            }
            calcularMacros();
        }

        function salvarImagem() {
            const areaPrint = document.getElementById('area-print');
            const assinatura = document.getElementById('assinatura-imagem');
            
            assinatura.classList.remove('hidden');

            html2canvas(areaPrint, {
                backgroundColor: "#1f2937",
                scale: 2 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Cardapio-Nivelado-65kg.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                assinatura.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
